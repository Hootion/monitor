services:
  postgres:
    image: postgres:16
    container_name: mutual-watch-postgres
    environment:
      POSTGRES_DB: mutual_watch
      POSTGRES_USER: mutual_watch
      POSTGRES_PASSWORD: mutual_watch_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mutual-watch-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

