group 'com.amap.flutter.amap_flutter_map'
version '1.0'

apply plugin: 'com.android.library'

android {
    namespace 'com.amap.flutter.amap_flutter_map'
    compileSdkVersion 36

    defaultConfig {
        minSdkVersion 23
